<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Deportivo </title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

/* Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #2b2b2b;
}

.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

/* 🐶 CONTENEDOR (antes .auto) */
.auto {
  position: absolute;
  bottom: 120px;
  left: 0px;
  transition: left 0.4s linear;
}

/* 🐶 PERRO */
.perro {
  position: relative;
  width: 140px;
  height: 60px;
}

/* Cuerpo */
.cuerpo-perro {
  width: 90px;
  height: 40px;
  background: #8d6e63;
  border-radius: 30px;
  position: absolute;
  left: 30px;
  top: 10px;
}

/* Cabeza */
.cabeza {
  width: 40px;
  height: 40px;
  background: #a1887f;
  border-radius: 50%;
  position: absolute;
  left: 0;
  top: 10px;
}

/* Oreja */
.oreja {
  width: 15px;
  height: 20px;
  background: #6d4c41;
  position: absolute;
  top: -5px;
  left: 5px;
  border-radius: 10px;
}

/* Ojo */
.ojo {
  width: 6px;
  height: 6px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 15px;
  left: 20px;
}

/* Cola */
.cola {
  width: 20px;
  height: 6px;
  background: #6d4c41;
  position: absolute;
  right: -10px;
  top: 20px;
  border-radius: 10px;
  transform-origin: left;
}

/* Animación cola */
@keyframes moverCola {
  0% { transform: rotate(20deg); }
  100% { transform: rotate(-20deg); }
}

.cola.moviendo {
  animation: moverCola 0.3s infinite alternate;
}

/* Patas */
.pata {
  width: 10px;
  height: 20px;
  background: #5d4037;
  position: absolute;
  bottom: -10px;
  border-radius: 5px;
}

.p1 { left: 40px; }
.p2 { left: 70px; }

/* Animación patas */
@keyframes correr {
  0% { transform: rotate(20deg); }
  100% { transform: rotate(-20deg); }
}

.girando {
  animation: correr 0.2s infinite alternate;
}

/* “Freno” ahora es nariz (solo para mantener lógica) */
#freno {
  width: 8px;
  height: 8px;
  background: black;
  position: absolute;
  left: 2px;
  top: 28px;
  border-radius: 50%;
  opacity: 0;
}

/* 💨 Humo (lo dejamos igual) */
.humo {
  position: absolute;
  left: -20px;
  bottom: 10px;
  width: 12px;
  height: 12px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}

@keyframes humoAnim {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-40px) scale(2); opacity: 0; }
}

.humo.activo {
  animation: humoAnim 1s infinite;
}

/* Texto */
#distancia {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🐶 Perro Inteligente</h1>
<div id="distancia">Cargando...</div>
<div id="estado"></div>

<div class="auto" id="auto">

  <div class="perro">
    <div class="cabeza">
      <div class="oreja"></div>
      <div class="ojo"></div>
    </div>

    <div class="cuerpo-perro"></div>

    <div class="cola moviendo"></div>

    <div class="pata p1" id="r1"></div>
    <div class="pata p2" id="r2"></div>

    <div id="freno"></div>
  </div>

  <div class="humo" id="humo"></div>

</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "52c6e926-ca65-4e4d-bd30-603dcc1f3700";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");
    let freno = document.getElementById("freno");
    let humo = document.getElementById("humo");

    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");

    let max = window.innerWidth - 150;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    auto.style.left = pos + "px";

    if (d < 20) {
      document.body.style.background = "#0b1a2a";
    } else {
      document.body.style.background = "#87ceeb";
    }

    if (d < 15) {
      estado.innerHTML = "🚨 FRENANDO";
      freno.style.opacity = 1;
      humo.classList.remove("activo");
      r1.classList.remove("girando");
      r2.classList.remove("girando");
    } 
    else if (d < 30) {
      estado.innerHTML = "⚠️ Acercándose";
      freno.style.opacity = 0;
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    } 
    else {
      estado.innerHTML = "🟢 A TODA VELOCIDAD";
      freno.style.opacity = 0;
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
